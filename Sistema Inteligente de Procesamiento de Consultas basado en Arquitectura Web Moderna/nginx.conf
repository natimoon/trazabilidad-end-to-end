# =============================================================================
# nginx.conf — Balanceador de Carga (Reverse Proxy)
# Tópico 3: Balanceador de Carga | Arquitectura Web | Prof. Rodrigo Benítez
# Alumna: Natalia Godoy
# =============================================================================
# Funcionamiento:
#   - Escucha en el puerto 8080 (no requiere sudo en macOS)
#   - Distribuye el tráfico entrante en Round Robin hacia 2 instancias
#     de Spring Boot corriendo en localhost:8081 y localhost:8082
# =============================================================================

worker_processes  2;                     # 1 por núcleo (M1 tiene 4 eficiencia + 4 rendimiento)

events {
    worker_connections  1024;            # Conexiones simultáneas por worker
}

http {
    # ---- MIME types ----
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Formato de log (acceso) ----
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream: $upstream_addr | $upstream_response_time';

    access_log  /usr/local/var/log/nginx/access.log  main;
    error_log   /usr/local/var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout  65;

    # ---- Agrupación de servidores backend (Spring Boot) ----
    upstream ecomart_backend { #Define el grupo de servidores
        # Algoritmo Round Robin (comportamiento por defecto de NGINX) # Distribuye las peticiones equitativamente entre los servidores
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
    }

    # ---- Servidor virtual (Proxy Inverso) ----
    server {
        listen       8080;               # Puerto del balanceador
        # =====================================================================
        # Cabeceras para que el backend conozca la IP real del cliente
        # y el protocolo original (HTTP/HTTPS).
        # =====================================================================
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # =====================================================================
        # Timeouts básicos para evitar que peticiones lentas acaparen recursos
        # =====================================================================
        proxy_connect_timeout   30s;       # Tiempo máximo para conectar con backend
        proxy_send_timeout      60s;       # Tiempo máximo para enviar datos al backend
        proxy_read_timeout      60s;       # Tiempo máximo para recibir respuesta del backend
        # =====================================================================
        # Endpoint raíz — redirige al index.html del backend
        # =====================================================================
        location / {
            proxy_pass http://ecomart_backend;
        }

        # =====================================================================
        # Endpoints de la API REST (Spring Boot)
        # =====================================================================
        location /categorizador {
            proxy_pass http://ecomart_backend;
        }

        location /imagen {
            proxy_pass http://ecomart_backend;
        }

        location /generador {
            proxy_pass http://ecomart_backend;
        }

        # =====================================================================
        # Swagger UI y OpenAPI
        # =====================================================================
        location /swagger-ui/ {
            proxy_pass http://ecomart_backend;
        }

        location /v3/api-docs {
            proxy_pass http://ecomart_backend;
        }

        # =====================================================================
        # Página de estado del balanceador (monitoreo básico)
        # http://localhost:8080/nginx_status
        # =====================================================================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
