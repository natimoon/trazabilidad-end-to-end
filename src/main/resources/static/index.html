<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecomart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
        }
        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="glass-card shadow-lg">
                <h1 class="display-4 fw-bold mb-4">🌿 Sistema IA Ecomart</h1>
                <p class="lead mb-4">Trabajo Práctico Integrador - Arquitectura Web 2026</p>

                <div class="bg-dark bg-opacity-50 p-3 rounded mb-4 text-start">
                    <p class="mb-1"><span class="status-dot"></span> <strong>Estado:</strong> Servidor en línea (Railway)</p>
                    <p class="mb-1"><strong>Estudiante:</strong> Natalia Leticia Godoy Ramirez, Noelia Insfran</p>
                    <p class="mb-0"><strong>Infraestructura:</strong> Java 21 + Spring Boot + PostgreSQL</p>
                </div>

                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <a href="/swagger-ui/index.html" class="btn btn-success btn-lg px-4 gap-3">Probar API con Swagger</a>
                    <button class="btn btn-outline-light btn-lg px-4" onclick="location.reload()">Refrescar Conexión</button>
                </div>

                <p class="mt-4 text-white-50 small">Evidencia de Trazabilidad End-to-End | FP-UNA</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
